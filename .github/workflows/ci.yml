name: CI

# Lint-only CI for the standalone chain-bridge repo.
#
# The crate graph has path dependencies on TWO sibling repos that live one
# level above this repo root in the gridtokenx-coresystem superproject:
#   - ../gridtokenx-blockchain-core   (separate repo, build.rs proto source)
#   - ../gridtokenx-telemetry         (lives INSIDE the private superproject)
#
# Neither is present in a standalone checkout, so `cargo check/clippy/test`
# (and even `cargo fmt`, which runs `cargo metadata` and must resolve every
# path dep) cannot run here without reconstructing that layout + a PAT for the
# private superproject. Full build/test therefore runs in the SUPERPROJECT CI,
# not here. This workflow is the lightweight standalone gate.
#
# Formatting is checked with bare `rustfmt --check` over this repo's own crate
# sources only — that path bypasses `cargo metadata`, so it needs no siblings
# and no secrets. It is non-blocking today because the codebase predates any
# `cargo fmt` pass; run a one-time `cargo fmt` and flip `continue-on-error` to
# `false` to turn this into a hard gate.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt (report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: rustfmt --check (own crates only, no cargo metadata)
        # Bare rustfmt over this repo's sources — avoids `cargo fmt`'s
        # `cargo metadata` step, which would fail on the absent sibling path
        # deps. Non-blocking until the repo gets a one-time `cargo fmt` pass.
        continue-on-error: true
        run: |
          set -o pipefail
          mapfile -d '' files < <(find crates -name '*.rs' -not -path '*/target/*' -print0)
          echo "Checking ${#files[@]} source files with rustfmt (edition 2024)…"
          rustfmt --edition 2024 --check "${files[@]}"

  manifests:
    name: manifest sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cargo.toml / lockfile presence
        run: |
          test -f Cargo.toml || { echo "::error::missing root Cargo.toml"; exit 1; }
          echo "Workspace members:"
          grep -A2 '^\[workspace\]' Cargo.toml || true
          # Every member crate must declare an edition (this workspace is 2024).
          fail=0
          for m in crates/*/Cargo.toml; do
            if ! grep -q '^edition' "$m"; then
              echo "::warning file=$m::no explicit edition in $m"
            fi
          done
          exit $fail
